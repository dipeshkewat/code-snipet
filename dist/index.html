OPTAB = {
    "MOVER": ("IS", "01"),
    "MOVEM": ("IS", "02"),
    "ADD": ("IS", "03"),
    "SUB": ("IS", "04"),
    "MULT": ("IS", "05"),
    "DIV": ("IS", "06"),
    "PRINT": ("IS", "09"),
    "READ": ("IS", "10"),
    "START": ("AD", "01"),
    "END": ("AD", "02"),
    "ORIGIN": ("AD", "04"),
    "LTORG": ("AD", "05"),
    "DS": ("DL", "01"),
    "DC": ("DL", "02"),
}

REG = {"AREG": 1, "BREG": 2, "CREG": 3, "DREG": 4}

def pass1():
    lc = 0
    symtab = {}
    littab = []
    inter = []

    with open("Input.txt") as f:
        lines = f.readlines()

    for line in lines:
        parts = line.strip().split()
        if len(parts) < 4:
            continue

        label, opcode, op1, op2 = parts

        if opcode == "START":
            lc = int(op1)
            inter.append(f"--- (AD,01) (C,{op1})")
            continue

        if label != "NAN":
            symtab[label] = lc

        if opcode in OPTAB:
            cls, code = OPTAB[opcode]

            if opcode == "START":
                lc = int(op1)
                inter.append(f"--- (AD,01) (C,{op1})")
                continue

            if cls == "IS":
                reg = REG.get(op1, 0) if op1 != "NAN" else 0

                if op2.startswith("="):
                    littab.append(op2)
                    operand = f"(L,{len(littab)})"
                elif op2 != "NAN":
                    operand = f"(S,{op2})"
                else:
                    operand = "NAN"

                inter.append(f"{lc} ({cls},{code}) {reg} {operand}")
                lc += 1

            elif cls == "DL":
                if opcode == "DS":
                    inter.append(f"{lc} (DL,01) (C,{op1})")
                    lc += int(op1)
                elif opcode == "DC":
                    inter.append(f"{lc} (DL,02) (C,{op1})")
                    lc += 1

            elif cls == "AD":
                if opcode == "END":
                    inter.append("--- (AD,02)")
                    break

    # Save files
    with open("Intermediate.txt", "w") as f:
        f.write("\\n".join(inter))

    with open("SymTab.txt", "w") as f:
        for k, v in symtab.items():
            f.write(f"{k} {v}\\n")

    with open("LitTab.txt", "w") as f:
        for i, lit in enumerate(littab, 1):
            f.write(f"{i} {lit}\\n")

    print("PASS 1 Completed")



    # PASS 2 

def load_table(filename):
    table = {}
    with open(filename) as f:
        for line in f:
            parts = line.split()
            if len(parts) >= 2:
                table[parts[0]] = parts[1]
    return table

def pass2():
    symtab = load_table("SymTab.txt")

    with open("Intermediate.txt") as f:
        lines = f.readlines()

    machine = []

    for line in lines:
        if "(IS," in line:
            parts = line.split()
            lc = parts[0]
            opcode = parts[1][4:6]
            reg = parts[2]

            if "(S," in parts[3]:
                sym = parts[3][3:-1]
                addr = symtab.get(sym, "000")
            else:
                addr = "000"

            machine.append(f"{lc} {opcode} {reg} {addr}")

        elif "(DL,01)" in line:
            parts = line.split()
            lc = parts[0]
            val = parts[-1].strip(")")
            machine.append(f"{lc} 00 0 {val}")

    with open("MachineCode.txt", "w") as f:
        f.write("\\n".join(machine))

    print("PASS 2 Completed")


if __name__ == "__main__":
    pass1()
    pass2()
`,category:"code",createdAt:1776593107891,updatedAt:1776593107891},{id:"2",title:"Implementation of Two Pass Macro Processor",content:`TITLE
Implementation of Two Pass Macro Processor

AIM
To study and implement a two-pass macro processor using Java.

THEORY
A macro processor is a system software that allows the use of macros, which are predefined sequences of instructions identified by a name. Instead of writing the same code repeatedly, a programmer can define it once and reuse it multiple times by invoking the macro. This helps in reducing code duplication and improving readability.
A macro consists of a macro name, parameters, and a body. Parameters are usually written with a & symbol and are replaced by actual arguments during macro expansion. The macro processor performs text substitution, meaning it replaces the macro call with its corresponding instructions without analyzing their meaning.
A two-pass macro processor works in two phases:

Pass 1 (Definition Phase)
In this phase, the processor scans the program and processes all macro definitions. It stores the information in tables such as:

MNT (Macro Name Table): stores macro names and pointers
MDT (Macro Definition Table): stores the macro body
ALA (Argument List Array): stores parameters

Macro definitions are removed after processing, and the remaining code is passed to the next phase.

Pass 2 (Expansion Phase)
In this phase, macro calls are expanded. The processor replaces each macro call with the corresponding code from MDT, using ALA to substitute actual arguments for parameters.







import java.io.*;
import java.util.*;

class MNTEntry {
    String name;
    int index;

    MNTEntry(String name, int index) {
        this.name = name;
        this.index = index;
    }
}

public class MacroProcessor {

    static List<MNTEntry> MNT = new ArrayList<>();
    static List<String> MDT = new ArrayList<>();
    static Map<String, List<String>> ALA = new HashMap<>();

    public static void main(String[] args) throws Exception {
        pass1();
        pass2();
    }

    // ---------------- PASS 1 ----------------
    static void pass1() throws Exception {
        BufferedReader br = new BufferedReader(new FileReader("Input.txt"));
        PrintWriter out = new PrintWriter("Pass1Output.txt");

        String line;
        boolean isMacro = false;
        String macroName = "";
        List<String> params = new ArrayList<>();

        while ((line = br.readLine()) != null) {

            if (line.equalsIgnoreCase("MACRO")) {
                isMacro = true;
                line = br.readLine();

                String[] parts = line.split("[ ,]+");
                macroName = parts[0];

                params = new ArrayList<>();
                for (int i = 1; i < parts.length; i++) {
                    params.add(parts[i]);
                }

                ALA.put(macroName, params);
                MNT.add(new MNTEntry(macroName, MDT.size()));

                MDT.add(line);

                while (!(line = br.readLine()).equalsIgnoreCase("MEND")) {
                    MDT.add(line);
                }

                MDT.add("MEND");
                isMacro = false;
            } 
            else {
                out.println(line);
            }
        }

        br.close();
        out.close();
    }

    // ---------------- PASS 2 ----------------
    static void pass2() throws Exception {
        BufferedReader br = new BufferedReader(new FileReader("Pass1Output.txt"));
        PrintWriter out = new PrintWriter("Pass2Output.txt");

        String line;

        while ((line = br.readLine()) != null) {
            String[] parts = line.split("[ ,]+");
            String word = parts[0];

            MNTEntry entry = null;
            for (MNTEntry m : MNT) {
                if (m.name.equals(word)) {
                    entry = m;
                    break;
                }
            }

            if (entry != null) {
                List<String> argsList = new ArrayList<>();
                if (parts.length > 1) {
                    argsList = Arrays.asList(parts[1].split(","));
                }

                int mdtIndex = entry.index + 1;

                while (!MDT.get(mdtIndex).equals("MEND")) {
                    String expanded = MDT.get(mdtIndex);

                    for (int i = 0; i < argsList.size(); i++) {
                        expanded = expanded.replace("&" + (i + 1), argsList.get(i));
                    }

                    out.println(expanded);
                    mdtIndex++;
                }
            } 
            else {
                out.println(line);
            }
        }

        br.close();
        out.close();
    }
}`,category:"code",createdAt:1776679507891,updatedAt:1776679507891},{id:"3",title:"Implementation of Lexical Analyzer",content:`TITLE

Implementation of Lexical Analyzer

AIM

To study and implement a lexical analyzer using Python.

THEORY

A lexical analyzer is the first phase of a compiler that reads the source program and converts it into a sequence of tokens. A token is the smallest unit of a program such as keywords, identifiers, operators, constants, and symbols. This process is called lexical analysis or scanning.

The lexical analyzer scans the input character by character and groups them into meaningful patterns. It removes unnecessary elements like spaces, tabs, and comments. It also identifies different types of tokens and classifies them accordingly.

The common types of tokens are:

Keywords (e.g., int, if, while)
Identifiers (variable names)
Operators (+, -, *, /, =)
Constants (numbers, strings)
Special symbols (;, {, }, etc.)

The output of the lexical analyzer is a stream of tokens which is passed to the next phase of the compiler (syntax analyzer).






# Lexical Analyzer (Medium Version)

keywords = ["int", "float", "if", "else", "while", "return"]
operators = ['+', '-', '*', '/', '=']
special_symbols = [';', ',', '(', ')', '{', '}']

def is_identifier(word):
    if word[0].isalpha():
        for ch in word:
            if not (ch.isalnum() or ch == '_'):
                return False
        return True
    return False

def is_number(word):
    for ch in word:
        if not ch.isdigit():
            return False
    return True

def lexical_analyzer(code):
    words = code.split()

    for word in words:

        if word in keywords:
            print(word, "-> Keyword")

        elif word in operators:
            print(word, "-> Operator")

        elif word in special_symbols:
            print(word, "-> Special Symbol")

        elif is_number(word):
            print(word, "-> Constant")

        elif is_identifier(word):
            print(word, "-> Identifier")

        else:
            print(word, "-> Unknown")

# Example input
code = "int a = 10 ; float b = a + 20 if a return b"

lexical_analyzer(code)`,category:"code",createdAt:1776765907891,updatedAt:1776765907891},{id:"4",title:"Implementation of Top-Down Parser (Recursive Descent Parser)",content:`TITLE

Implementation of Top-Down Parser (Recursive Descent Parser)

AIM

To study and implement a top-down parser using recursive descent method in C.

THEORY

A top-down parser is a type of syntax analyzer that builds the parse tree from the start symbol to the input string. It tries to derive the input string by applying production rules of a grammar. One common method of top-down parsing is the recursive descent parser.

A recursive descent parser uses a set of recursive functions, where each function corresponds to a non-terminal in the grammar. It processes the input from left to right and checks whether the given string can be derived from the grammar.

This parser does not use backtracking in simple cases and works efficiently for grammars that are left-factored and free from left recursion.

For this experiment, a common grammar used is:

E → T E'
E' → + T E' | ε
T → F T'
T' → * F T' | ε
F → (E) | id

The parser checks whether the given input string is valid according to the grammar. If all symbols are matched and input is completely consumed, the string is accepted; otherwise, it is rejected.





#include <stdio.h>
#include <string.h>

char input[50];
int i = 0;

// Function declarations
void E();
void Eprime();
void T();
void Tprime();
void F();

void E() {
    T();
    Eprime();
}

void Eprime() {
    if (input[i] == '+') {
        i++;
        T();
        Eprime();
    }
}

void T() {
    F();
    Tprime();
}

void Tprime() {
    if (input[i] == '*') {
        i++;
        F();
        Tprime();
    }
}

void F() {
    if (input[i] == '(') {
        i++;
        E();
        if (input[i] == ')') {
            i++;
        } else {
            printf("Error: Missing )\\n");
        }
    }
    else if (input[i] == 'i' && input[i+1] == 'd') {
        i += 2; // for 'id'
    }
    else {
        printf("Error: Invalid symbol\\n");
    }
}

int main() {
    printf("Enter input string: ");
    scanf("%s", input);

    E();

    if (input[i] == '\\0') {
        printf("String is accepted\\n");
    } else {
        printf("String is rejected\\n");
    }

    return 0;
}`,category:"code",createdAt:1776852307891,updatedAt:1776852307891},{id:"5",title:"Implementation of Bottom-Up Parser (Shift Reduce Parser)",content:`TITLE

Implementation of Bottom-Up Parser (Shift Reduce Parser)

AIM

To study and implement a bottom-up parser using shift-reduce parsing technique in Python.

THEORY

A bottom-up parser is a type of syntax analyzer that builds the parse tree from the input string to the start symbol. It attempts to reduce the input string step by step into the start symbol by applying production rules in reverse. One common method of bottom-up parsing is the shift-reduce parser.

In shift-reduce parsing, the parser uses a stack and an input buffer. It performs two main operations:

Shift: Moves the next input symbol onto the stack
Reduce: Replaces a sequence of symbols on the stack with a non-terminal based on grammar rules

The parser continues shifting and reducing until the stack contains only the start symbol and the input is fully consumed.

This method is efficient and widely used in compiler design. If the parser successfully reduces the input to the start symbol, the string is accepted; otherwise, it is rejected.
















# Shift Reduce Parser (Bottom-Up)

stack = []
input_string = ""
i = 0

# Grammar rules
# E -> E+E | E*E | (E) | id

def check():
    global stack

    # Convert list to string for pattern matching
    s = ''.join(stack)

    # Reduce id to E
    if "id" in s:
        index = s.index("id")
        stack[index:index+2] = ["E"]
        print("Reduce: id -> E")
        return True

    # Reduce E+E to E
    if "E+E" in s:
        index = s.index("E+E")
        stack[index:index+3] = ["E"]
        print("Reduce: E+E -> E")
        return True

    # Reduce E*E to E
    if "E*E" in s:
        index = s.index("E*E")
        stack[index:index+3] = ["E"]
        print("Reduce: E*E -> E")
        return True

    # Reduce (E) to E
    if "(E)" in s:
        index = s.index("(E)")
        stack[index:index+3] = ["E"]
        print("Reduce: (E) -> E")
        return True

    return False


def shift_reduce_parser(inp):
    global i
    print("Stack\\tInput\\tAction")

    while True:
        # Shift
        if i < len(inp):
            stack.append(inp[i])
            print(''.join(stack), "\\t", inp[i+1:], "\\tShift")
            i += 1

            # Try reduce after shift
            while check():
                print(''.join(stack), "\\t", inp[i:], "\\tReduce")

        else:
            # Final reductions
            while check():
                print(''.join(stack), "\\t", "", "\\tReduce")
            break

    # Final check
    if ''.join(stack) == "E":
        print("\\nString Accepted")
    else:
        print("\\nString Rejected")


# Input (use id+id*id format)
input_string = "id+id*id"
shift_reduce_parser(input_string)`,category:"code",createdAt:1776938707892,updatedAt:1776938707892},{id:"6",title:"Implementation of Intermediate Code Generation",content:`TITLE

Implementation of Intermediate Code Generation

AIM

To study and implement intermediate code generation for simple expressions in C.

THEORY

Intermediate code generation is a phase of a compiler where the source program is converted into an intermediate representation (IR). This representation is between high-level language and machine code, making it easier to optimize and translate into different target machines.

One common form of intermediate code is three-address code (TAC). In TAC, each instruction contains at most three operands and one operator. Complex expressions are broken into simpler steps using temporary variables.

For example:
Expression: a = b + c * d
Intermediate Code:

t1 = c * d
t2 = b + t1
a = t2

The compiler generates such code to simplify further processing like optimization and final code generation.

The main advantage of intermediate code is that it is machine-independent, easy to optimize, and improves compiler design by separating different phases.














#include <stdio.h>
#include <string.h>

int main() {
    char input[50];
    char op1, op2, operator;
    int tempCount = 1;

    printf("Enter expression (e.g. a=b+c*d): ");
    scanf("%s", input);

    printf("\\nThree Address Code:\\n");

    // Example: a=b+c*d
    // Step 1: find operator precedence (* or / first)
    for (int i = 0; i < strlen(input); i++) {

        if (input[i] == '*' || input[i] == '/') {
            op1 = input[i - 1];
            op2 = input[i + 1];
            operator = input[i];

            printf("t%d = %c %c %c\\n", tempCount, op1, operator, op2);

            input[i - 1] = 't';
            input[i] = '0' + tempCount; // replace with t1, t2...
            input[i + 1] = ' ';

            tempCount++;
        }
    }

    // Step 2: handle + and -
    for (int i = 0; i < strlen(input); i++) {

        if (input[i] == '+' || input[i] == '-') {
            op1 = input[i - 1];
            op2 = input[i + 1];
            operator = input[i];

            printf("t%d = %c %c %c\\n", tempCount, op1, operator, op2);

            input[i - 1] = 't';
            input[i] = '0' + tempCount;
            input[i + 1] = ' ';

            tempCount++;
        }
    }

    // Final assignment
    printf("%c = t%d\\n", input[0], tempCount - 1);

    return 0;
}`,category:"code",createdAt:1777025107892,updatedAt:1777025107892},{id:"7",title:"Implementation of Code Generation Phase of Compiler",content:`TITLE

Implementation of Code Generation Phase of Compiler

AIM

To study and implement code generation for the given intermediate code in C.

THEORY

Code generation is the final phase of a compiler where the intermediate representation of a program is converted into target code such as assembly or machine language. The input to this phase is usually a form like three-address code, and the output is low-level code that can be executed by a machine.

The main task of the code generator is to translate each intermediate instruction into a sequence of target instructions. It also manages the use of registers and memory efficiently. The generated code should be correct and optimized for performance.

In this phase, the compiler uses concepts like register descriptors and address descriptors. A register descriptor keeps track of the contents of registers, while an address descriptor stores the location of variables during execution.

For example:
Three-address code: x = y + z
Generated code:

MOV R0, y
ADD R0, z
MOV x, R0

Thus, code generation converts high-level representations into machine-level instructions that can be executed.





#include <stdio.h>
#include <string.h>

struct quad {
    char result[10], arg1[10], arg2[10], op;
} q[10];

int n;

// Function to generate code
void generateCode() {
    int i;

    for (i = 0; i < n; i++) {

        if (q[i].op == '+') {
            printf("MOV R0, %s\\n", q[i].arg1);
            printf("ADD R0, %s\\n", q[i].arg2);
            printf("MOV %s, R0\\n\\n", q[i].result);
        }

        else if (q[i].op == '-') {
            printf("MOV R0, %s\\n", q[i].arg1);
            printf("SUB R0, %s\\n", q[i].arg2);
            printf("MOV %s, R0\\n\\n", q[i].result);
        }

        else if (q[i].op == '*') {
            printf("MOV R0, %s\\n", q[i].arg1);
            printf("MUL R0, %s\\n", q[i].arg2);
            printf("MOV %s, R0\\n\\n", q[i].result);
        }

        else if (q[i].op == '/') {
            printf("MOV R0, %s\\n", q[i].arg1);
            printf("DIV R0, %s\\n", q[i].arg2);
            printf("MOV %s, R0\\n\\n", q[i].result);
        }

        else if (q[i].op == '=') {
            printf("MOV R0, %s\\n", q[i].arg1);

Implementation of Lex Program using LEX Tool

AIM

To study and implement a lexical analyzer using LEX tool.

THEORY

LEX is a tool used to generate lexical analyzers. It takes a set of rules as input and produces a program (usually in C) that can recognize patterns in text. These patterns are defined using regular expressions, and each pattern is associated with an action to be performed when it is matched.

A LEX program consists of three main sections:

Definition Section: Contains declarations of variables and regular definitions
Rules Section: Contains patterns and corresponding actions
User Subroutines Section: Contains additional C code, including the main() function

The lexical analyzer generated by LEX reads the input character by character and matches it with the given patterns. When a match is found, the corresponding action is executed.

LEX is often used with YACC, which handles syntax analysis. While LEX identifies tokens, YACC uses those tokens to check grammatical structure.




%{
#include <stdio.h>
int keywords = 0, identifiers = 0, numbers = 0, operators = 0;
%}

digit      [0-9]
letter     [a-zA-Z]
id         {letter}({letter}|{digit})*

%%

"int"|"float"|"if"|"else"|"while"|"return"   {
    printf("Keyword: %s\\n", yytext);
    keywords++;
}

{id}    {
    printf("Identifier: %s\\n", yytext);
    identifiers++;
}

{digit}+    {
    printf("Number: %s\\n", yytext);
    numbers++;
}

"+"|"-"|"*"|"/"|"="    {
    printf("Operator: %s\\n", yytext);
    operators++;
}

[ \\t\\n]+   ;   // ignore whitespace

.   {
    printf("Invalid: %s\\n", yytext);
}

%%

int main() {
    printf("Enter input:\\n");
    yylex();

    printf("\\nSummary:\\n");
    printf("Keywords: %d\\n", keywords);
    printf("Identifiers: %d\\n", identifiers);
    printf("Numbers: %d\\n", numbers);
    printf("Operators: %d\\n", operators);

    return 0;
}

int yywrap() {
    return 1;
}`,category:"code",createdAt:1777197907892,updatedAt:1777197907892}],mp={code:j.jsx(cy,{size:12}),notes:j.jsx(by,{size:12}),experiments:j.jsx(my,{size:12}),other:j.jsx(ry,{size:12})};function hp(f){const z=Math.floor((Date.now()-f)/1e3);if(z<60)return"just now";const g=Math.floor(z/60);if(g<60)return`${g}m ago`;const s=Math.floor(g/60);if(s<24)return`${s}h ago`;const M=Math.floor(s/24);return M<30?`${M}d ago`:new Date(f).toLocaleDateString()}function yp({snippet:f,onDelete:z}){const[g,s]=wt.useState(!1),[M,D]=wt.useState(!1),[R,L]=wt.useState(!1),_=ai.find(ft=>ft.value===f.category)||ai[3],b=wt.useCallback(async()=>{try{await navigator.clipboard.writeText(f.content),s(!0),setTimeout(()=>s(!1),2e3)}catch{const ft=document.createElement("textarea");ft.value=f.content,document.body.appendChild(ft),ft.select(),document.execCommand("copy"),document.body.removeChild(ft),s(!0),setTimeout(()=>s(!1),2e3)}},[f.content]),X=wt.useCallback(()=>{R?z(f.id):(L(!0),setTimeout(()=>L(!1),3e3))},[R,z,f.id]),C=f.content.split(`
